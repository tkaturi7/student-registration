<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration - PE3 CI/CD Test</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 540px;
      background: #ffffff;
      border-radius: 22px;
      padding: 38px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.30);
      border-top: 8px solid #00b09b;
    }

    .badge {
      text-align: center;
      background: #e8f7f4;
      color: #00796b;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h2 {
      margin: 0;
      color: #0f2027;
      font-size: 32px;
      letter-spacing: 0.5px;
    }

    .header p {
      margin-top: 10px;
      color: #666666;
      font-size: 15px;
    }

    label {
      display: block;
      font-weight: bold;
      color: #333333;
      margin-bottom: 7px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 18px;
      border: 1px solid #cccccc;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #00b09b;
      box-shadow: 0 0 0 4px rgba(0, 176, 155, 0.15);
    }

    input[type="file"] {
      padding: 11px;
      background: #f7f9fc;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #00b09b, #96c93d);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 17px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #009688, #7cb342);
      box-shadow: 0 10px 20px rgba(0, 176, 155, 0.25);
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #777777;
    }

    .footer span {
      color: #00b09b;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="badge">
      PE3 GKE CI/CD Test Version
    </div>

    <div class="header">
      <h2>Student Registration</h2>
      <p>Submit student details and upload resume to Cloud Storage</p>
    </div>

    /register

      <label for="student_name">Student Name</label>
      <input
        type="text"
        id="student_name"
        name="student_name"
        placeholder="Enter student name"
        required
      >

      <label for="student_id">Student ID</label>
      <input
        type="text"
        id="student_id"
        name="student_id"
        placeholder="Enter student ID"
        required
      >

      <label for="contact_no">Contact Number</label>
      <input
        type="text"
        id="contact_no"
        name="contact_no"
        placeholder="Enter contact number"
        required
      >

      <label for="location">Location</label>
      <input
        type="text"
        id="location"
        name="location"
        placeholder="Enter location"
        required
      >

      <label for="resume">Resume</label>
      <input
        type="file"
        id="resume"
        name="resume"
        required
      >

      <button type="submit">Submit Registration</button>

    </form>

    <div class="footer">
      Student Registration Kubernetes Lab | <span>Updated through GitHub Actions</span>
    </div>

  </div>
</body>
</html>
