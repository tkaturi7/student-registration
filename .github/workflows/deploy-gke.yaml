name: Build and deploy to GKE

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  IMAGE: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/student-registration

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ vars.WIF_PROVIDER }}
        service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

    - name: Set up Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v3

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker ${{ vars.GAR_LOCATION }}-docker.pkg.dev --quiet

    - name: Build and push image
      run: |
        docker build -t "$IMAGE:${GITHUB_SHA}" .
        docker push "$IMAGE:${GITHUB_SHA}"

    - name: Get GKE credentials
      uses: google-github-actions/get-gke-credentials@v3
      with:
        cluster_name: ${{ vars.GKE_CLUSTER }}
        location: ${{ vars.GKE_LOCATION }}
        project_id: ${{ vars.GCP_PROJECT_ID }}

    - name: Deploy application image
      run: |
        kubectl set image deployment/student-registration \
          application="$IMAGE:${GITHUB_SHA}" \
          -n "${{ vars.K8S_NAMESPACE }}"

        kubectl rollout status deployment/student-registration \
          -n "${{ vars.K8S_NAMESPACE }}" \
          --timeout=180s
